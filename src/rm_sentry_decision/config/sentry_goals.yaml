# Placeholder map goals for RM2026 sentry intent execution.
# IMPORTANT: measure and replace every x/y/yaw in the actual competition map
# before field use. These values are only safe for bench/bringup wiring tests.
#
# FIELD HOTFIX NOTES:
# - BASE_HOME / SUPPLY_LEFT / SUPPLY_RIGHT must be filled with real map
#   coordinates measured on the competition field.
# - Keep goal ids unchanged: SUPPLY_LEFT=5, SUPPLY_RIGHT=6, BASE_HOME=19.
#   These ids are part of SentryIntent / sentry_decision_protocol mapping.
# - BASE_HOME must sit inside an area that can trigger base RFID or another
#   valid recovery RFID.
# - SUPPLY_LEFT / SUPPLY_RIGHT must sit inside areas that can trigger supply
#   RFID.
# - If sentry_bt reaches a candidate but RFID does not confirm recovery, it
#   switches to the next recovery candidate automatically.
