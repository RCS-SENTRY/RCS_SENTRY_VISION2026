bt_navigator:
  ros__parameters:
    use_sim_time: false
    # 【必须手动确认】GLOBAL_FRAME：默认使用 rm_global_localization 发布的 map
    global_frame: map
    # 【必须手动确认】ROBOT_BASE_FRAME：默认使用实车车体坐标 base_link
    robot_base_frame: base_link
    # 【必须手动确认】ODOM_TOPIC：默认使用 Point-LIO 输出的 /aft_mapped_to_init
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    # 【必须手动确认】ODOM_TOPIC：默认使用 Point-LIO 输出的 /aft_mapped_to_init
    odom_topic: /aft_mapped_to_init
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.02
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      # 第一版上车先保守限速，不追求极限速度。
      min_vel_x: -0.60
      min_vel_y: -0.60
      max_vel_x: 1.00
      max_vel_y: 1.00
      max_vel_theta: 1.00
      min_speed_xy: 0.00
      max_speed_xy: 1.20
      min_speed_theta: 0.00
      acc_lim_x: 0.80
      acc_lim_y: 0.80
      acc_lim_theta: 1.20
      decel_lim_x: -1.20
      decel_lim_y: -1.20
      decel_lim_theta: -1.50
      vx_samples: 15
      vy_samples: 15
      vtheta_samples: 20
      sim_time: 1.20
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.20
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.10
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 1.0
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.15
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.15
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 24.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.30
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      track_unknown_space: true
      # FOOTPRINT: 由车辆参数推导 (单位 m)
      #   chassis_radius = 0.25m (底盘中心到轮接地点)
      #   + 安全余量 0.05m
      #   → 外接正方形半边长 = 0.30m
      #   如实车外廓有超出的结构(云台/装甲板)，请在此 footprint 上叠加。
      footprint: "[[0.30, 0.30], [0.30, -0.30], [-0.30, -0.30], [-0.30, 0.30]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /livox/lidar/pointcloud
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.10
          max_obstacle_height: 1.80
          obstacle_min_range: 0.10
          obstacle_max_range: 8.00
          raytrace_min_range: 0.10
          raytrace_max_range: 10.00
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.50
      resolution: 0.05
      track_unknown_space: true
      # FOOTPRINT: 需与 local_costmap 保持一致
      footprint: "[[0.30, 0.30], [0.30, -0.30], [-0.30, -0.30], [-0.30, 0.30]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          # 【必须手动确认】POINTCLOUD_TOPIC：默认使用 Livox 驱动的原始 PointCloud2。
          # 静态障碍由 static_layer 保底，动态障碍由 raw cloud 叠加。
          topic: /livox/lidar/pointcloud
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.10
          max_obstacle_height: 1.80
          obstacle_min_range: 0.10
          obstacle_max_range: 12.00
          raytrace_min_range: 0.10
          raytrace_max_range: 15.00
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.30
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.20
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
