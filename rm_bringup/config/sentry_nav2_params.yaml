# =============================================================================
# sentry_nav2_params.yaml — RM Sentry Nav2 参数 (v5 极简稳定版)
# =============================================================================
# 核心改动:
#   1. 删除 plugin_lib_names — 让 bt_navigator 加载默认插件（之前裁剪导致 inactive）
#   2. global_costmap 只保留 static_layer + inflation_layer
#   3. local_costmap = static_layer + obstacle_layer + inflation_layer
#   4. local obstacle layer 单雷达阶段只 marking, 不 clearing
#   5. Controller = 单雷达安全模式 DWB（禁用 vy, 保守旋转）
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    # [CRITICAL] 不设 plugin_lib_names — 让 bt_navigator 加载全部默认插件
    # 之前手工裁剪导致 bt_navigator inactive, 整条管道断裂

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    odom_topic: /aft_mapped_to_init
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.00
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 5.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.30
      min_vel_y: 0.00
      max_vel_x: 0.50
      max_vel_y: 0.00
      max_vel_theta: 0.45
      min_speed_xy: 0.00
      max_speed_xy: 0.50
      min_speed_theta: 0.00
      acc_lim_x: 0.50
      acc_lim_y: 0.50
      acc_lim_theta: 0.60
      decel_lim_x: -0.80
      decel_lim_y: -0.80
      decel_lim_theta: -0.60
      vx_samples: 6
      vy_samples: 1
      vtheta_samples: 10
      sim_time: 1.20
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.35
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 6.0
      PathAlign.scale: 8.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 6.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 12.0
      GoalDist.scale: 8.0
      RotateToGoal.scale: 16.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 1.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.24, 0.24], [0.24, -0.24], [-0.24, -0.24], [-0.24, 0.24]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: obstacle_cloud
        obstacle_cloud:
          # raw lidar -> C++ 过滤节点 -> /nav_obstacle_cloud
          topic: /nav_obstacle_cloud
          data_type: "PointCloud2"
          marking: true
          clearing: true
          observation_persistence: 0.0
          min_obstacle_height: 0.08
          max_obstacle_height: 1.20
          obstacle_min_range: 0.25
          obstacle_max_range: 3.00
          raytrace_min_range: 0.05
          raytrace_max_range: 3.20
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.10
        cost_scaling_factor: 10.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 1.0
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.24, 0.24], [0.24, -0.24], [-0.24, -0.24], [-0.24, 0.24]]"
      # 全局只用静态地图 + 膨胀，不用 obstacle_layer
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.12
        cost_scaling_factor: 10.0

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.80
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    local_frame: odom
    global_frame: map
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
