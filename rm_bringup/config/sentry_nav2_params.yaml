bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # 官方默认单点导航执行树，包含重规划与恢复动作；这里不引入任何战术逻辑
    default_nav_to_pose_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    odom_topic: /aft_mapped_to_init
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.02
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.20
      movement_time_allowance: 5.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 40
      model_dt: 0.05
      batch_size: 1200
      iteration_count: 1
      prune_distance: 2.0
      transform_tolerance: 0.15
      temperature: 0.30
      gamma: 0.015
      # MPPI 没有单独的 holonomic_robot 开关；使用 Omni motion model 即等价于全向底盘模式
      motion_model: Omni
      visualize: false
      # 全向轮底盘允许 X/Y 双向平移，最大平移速度 2.0 m/s
      vx_max: 4.0
      vx_min: -4.0
      vy_max: 4.0
      wz_max: 2.5
      vx_std: 0.25
      vy_std: 0.25
      wz_std: 0.35
      critics:
        - ConstraintCritic
        - ObstaclesCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
      ConstraintCritic.cost_weight: 4.0
      GoalCritic.cost_weight: 5.0
      GoalAngleCritic.cost_weight: 3.0
      GoalAngleCritic.threshold_to_consider: 0.5
      PathAlignCritic.cost_weight: 8.0
      PathAlignCritic.threshold_to_consider: 0.6
      PathFollowCritic.cost_weight: 6.0
      PathFollowCritic.threshold_to_consider: 1.2
      PathAngleCritic.cost_weight: 2.5
      PathAngleCritic.threshold_to_consider: 0.5
      ObstaclesCritic.cost_weight: 10.0
      ObstaclesCritic.repulsion_weight: 1.5
      ObstaclesCritic.critical_weight: 20.0
      ObstaclesCritic.consider_footprint: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      resolution: 0.05
      # 全向哨兵先按矩形 footprint 建模，允许 X/Y 横移时避障更可靠
      footprint: "[[0.42, 0.30], [0.42, -0.30], [-0.42, -0.30], [-0.42, 0.30]]"
      plugins: [obstacle_layer, inflation_layer]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: cloud
        cloud:
          topic: /cloud_registered
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: 0.2
          max_obstacle_height: 1.5
          obstacle_min_range: 0.10
          obstacle_max_range: 8.0
          raytrace_min_range: 0.10
          raytrace_max_range: 10.0
          inf_is_valid: false

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.4
        cost_scaling_factor: 4.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.42, 0.30], [0.42, -0.30], [-0.42, -0.30], [-0.42, 0.30]]"
      plugins: [static_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.4
        cost_scaling_factor: 4.0

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: [GridBased]

    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.15
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 1.5
      motion_model_for_search: MOORE
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 1.5
    max_rotational_vel: 2.5
    min_rotational_vel: 0.3
    rotational_acc_lim: 3.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
