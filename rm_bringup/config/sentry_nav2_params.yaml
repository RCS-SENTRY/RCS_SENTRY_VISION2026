# =============================================================================
# sentry_nav2_params.yaml — RM Sentry Nav2 参数 (v5 极简稳定版)
# =============================================================================
# 核心改动:
#   1. 删除 plugin_lib_names — 让 bt_navigator 加载默认插件（之前裁剪导致 inactive）
#   2. global_costmap 只保留 static_layer + inflation_layer
#   3. local_costmap = static_layer + obstacle_layer + inflation_layer
#   4. local obstacle layer 吃 fading local obstacle memory
#   5. Controller = 真全向 DWB（恢复 vy）
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    # [CRITICAL] 不设 plugin_lib_names — 让 bt_navigator 加载全部默认插件
    # 之前手工裁剪导致 bt_navigator inactive, 整条管道断裂

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    odom_topic: /aft_mapped_to_init
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.00
    min_theta_velocity_threshold: 0.0
    failure_tolerance: 5.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 6.28

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.25
      min_vel_y: -0.30
      max_vel_x: 0.40
      max_vel_y: 0.30
      max_vel_theta: 0.0
      min_speed_xy: 0.00
      max_speed_xy: 0.40
      min_speed_theta: 0.00
      acc_lim_x: 0.45
      acc_lim_y: 0.60
      acc_lim_theta: 0.00
      decel_lim_x: -0.60
      decel_lim_y: -0.80
      decel_lim_theta: 0.00
      vx_samples: 6
      vy_samples: 7
      vtheta_samples: 1
      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.35
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["Oscillation", "BaseObstacle", "PathDist", "GoalDist"]
      BaseObstacle.scale: 20.0
      PathDist.scale: 8.0
      GoalDist.scale: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 1.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.27, 0.27], [0.27, -0.27], [-0.27, -0.27], [-0.27, 0.27]]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: obstacle_cloud

        obstacle_cloud:
          # Point-LIO /cloud_registered -> fading obstacle memory -> /nav_obstacle_memory
          topic: /nav_obstacle_memory
          data_type: "PointCloud2"
          marking: true
          clearing: false
          observation_persistence: 0.0
          min_obstacle_height: 0.05
          max_obstacle_height: 1.20
          obstacle_min_range: 0.20
          obstacle_max_range: 4.00
          raytrace_min_range: 0.05
          raytrace_max_range: 4.20
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 5.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 1.0
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.27, 0.27], [0.27, -0.27], [-0.27, -0.27], [-0.27, 0.27]]"
      # 全局只用静态地图 + 膨胀，不用 obstacle_layer
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 5.0

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.80
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    local_frame: odom
    global_frame: map
    cycle_frequency: 10.0
    behavior_plugins: ["wait"]

    wait:
      plugin: "nav2_behaviors/Wait"

    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.0
    min_rotational_vel: 0.0
    rotational_acc_lim: 0.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    scale_velocities: false
    max_velocity: [0.40, 0.30, 0.0]
    min_velocity: [-0.25, -0.30, 0.0]
    max_accel: [0.45, 0.60, 0.0]
    max_decel: [-0.60, -0.80, 0.0]
    odom_topic: /aft_mapped_to_init
    odom_duration: 0.2
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - velocity_smoother
      - behavior_server
      - bt_navigator
