# =============================================================================
# sentry_nav2_params.yaml — RM Sentry Nav2 参数 (v4 重构)
# =============================================================================
# 修复清单:
#   1. behavior_server: 补齐 Humble 所需的 local/global costmap/footprint topic
#   2. controller_server: progress_checker_plugin → progress_checker_plugins (复数)
#   3. local_costmap: 移除 static_layer (rolling_window 不应加 static)
#   4. 插件命名: 统一使用 package::Plugin 风格
#   5. obstacle_layer: 使用 /cloud_registered (Point-LIO 输出, odom 系, 最稳定)
#   6. 保守速度参数
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # [FIX] 先用最简单的 BT, 调通后再换 replanning 版本
    # replanning 版本更容易卡在 recovery 循环
    default_nav_to_pose_bt_xml: >
      /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    # [FIX] 只加载 navigate_to_pose_w_replanning_and_recovery.xml 实际需要的插件
    # 一个无效插件就会导致整个 bt_navigator activate 失败!
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    odom_topic: /aft_mapped_to_init
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.02
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.5
    # [FIX] Humble 要求复数形式
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      # 保守限速 — 先跑起来再说
      min_vel_x: -0.30
      min_vel_y: -0.30
      max_vel_x: 0.50
      max_vel_y: 0.50
      max_vel_theta: 0.80
      min_speed_xy: 0.00
      max_speed_xy: 0.60
      min_speed_theta: 0.00
      acc_lim_x: 0.50
      acc_lim_y: 0.50
      acc_lim_theta: 1.00
      decel_lim_x: -0.80
      decel_lim_y: -0.80
      decel_lim_theta: -1.20
      vx_samples: 10
      vy_samples: 10
      vtheta_samples: 15
      sim_time: 1.50
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.50
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.50
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.30, 0.30], [0.30, -0.30], [-0.30, -0.30], [-0.30, 0.30]]"
      # [FIX] rolling_window 不加 static_layer, 只用 obstacle + inflation
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          # [FIX] 使用 /cloud_registered — Point-LIO 输出, odom 系, 最稳定
          topic: /cloud_registered
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: -0.20
          max_obstacle_height: 1.80
          obstacle_min_range: 0.15
          obstacle_max_range: 5.00
          raytrace_min_range: 0.10
          raytrace_max_range: 6.00
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 5.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 1.0
      resolution: 0.05
      # [FIX] 改为 false: PGM 地图通常 80%+ 区域为 unknown
      # track_unknown_space=true 会把 unknown 当障碍, planner 规划不出路径
      track_unknown_space: false
      footprint: "[[0.30, 0.30], [0.30, -0.30], [-0.30, -0.30], [-0.30, 0.30]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /cloud_registered
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: -0.20
          max_obstacle_height: 1.80
          obstacle_min_range: 0.15
          obstacle_max_range: 8.00
          raytrace_min_range: 0.10
          raytrace_max_range: 10.00
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.50
      use_astar: true
      allow_unknown: true

# [FIX] behavior_server — 补齐 Humble 所需的全部 topic/frame 字段
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    local_frame: odom
    global_frame: map
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    robot_base_frame: base_link
    transform_tolerance: 0.50
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator