rm_initial_pose_manager:
  ros__parameters:
    gimbal_status_topic: /gimbal_status
    initialpose_topic: /initialpose
    map_frame: map

    # 平时测试: 启动导航/定位链后自动发一次初始位姿
    # 比赛时: 仍会在收到 game_progress=3 时再次按 robot_id 重发一轮
    publish_on_startup: true
    startup_delay_sec: 3.0

    # 裁判系统阶段触发
    publish_on_game_progress: true
    game_progress_trigger: 3

    # 连发几帧, 提高 /initialpose 在 bringup 阶段被接收到的概率
    publish_burst_count: 5
    publish_period_sec: 0.2

    # 调试 fallback: 无裁判信息时使用
    fallback_robot_id: 7

    # 起始位姿: [x, y, z, yaw_deg]
    # TODO: 明日实车雷达标定完成后, 按官方先验地图坐标填写
    red_start_pose: [0.0, 0.0, 0.0, 0.0]
    blue_start_pose: [0.0, 0.0, 0.0, 0.0]

    covariance_xy: 0.25
    covariance_z: 0.10
    covariance_yaw_deg: 10.0
