rm_global_localization:
  ros__parameters:
    cloud_topic: /cloud_registered
    initialpose_topic: /initialpose
    odom_topic: /aft_mapped_to_init
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    map_path: /home/rm/Desktop/SENTRY_FULL/RMUC2026.pcd

    map_voxel_size: 0.25
    scan_voxel_size: 0.15
    num_neighbors: 20
    num_threads: 4

    max_correspondence_distance: 1.5
    max_iterations: 20
    translation_eps: 0.001
    rotation_eps: 0.001
    min_scan_points: 200
    # Gate on normalized mean GICP error (raw_error / num_inliers), not total accumulated error.
    # Good alignments are expected to be small; start conservative and tune with logs.
    fitness_threshold: 0.2
    relocalization_timeout_sec: 1.0
    tf_lookup_timeout_sec: 0.05
    spin_threshold_rad_s: 5.0
    enable_reset_odom_on_recovery: true
    reset_odom_service: /reset_odom
